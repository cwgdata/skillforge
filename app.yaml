command: ['python', '-m', 'uvicorn', 'app.app:app', '--host', '0.0.0.0', '--port', '8000']
env:
  # Your workspace's AI Gateway base URL (workspace id = the ?o= parameter).
  # Routing through the Gateway is what populates system.ai_gateway.usage.
  - name: 'AI_GATEWAY_URL'
    value: 'https://YOUR_WORKSPACE_ID.ai-gateway.cloud.databricks.com/mlflow/v1'
  # Injected from the app's attached SQL-warehouse resource (named "warehouse").
  - name: 'DATABRICKS_WAREHOUSE_ID'
    valueFrom: 'warehouse'
  - name: 'SKILLFORGE_CATALOG'
    value: 'main'
  - name: 'SKILLFORGE_SCHEMA'
    value: 'core'
